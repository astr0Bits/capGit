spring.application.name=Capstone-Prototype-1.2

spring.datasource.url=jdbc:mysql://localhost:3306/CapstoneProject?useSSL=false
spring.datasource.username=root
spring.datasource.password=1087226

# Hibernate properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
app.jwt-secret=your-very-long-secret-key-that-is-at-least-32-characters-long-here
app.jwt-expiration-milliseconds=86400000


# Frontend configuration
spring.web.resources.static-locations=classpath:/static/

# SpringDoc OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Email configuration (you'll need to implement email service)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true