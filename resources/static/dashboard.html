<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap UAE - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .welcome-card {
            background: white;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .action-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">SkillSwap<sup>®</sup> UAE</div>
        <div class="user-info">
            <span id="userEmail">Loading...</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-card">
            <h1>Welcome to SkillSwap UAE!</h1>
            <p>Your skill-sharing journey starts here.</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="credits">0</div>
                <div>Available Credits</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="role">-</div>
                <div>Your Role</div>
            </div>
        </div>

        <div class="actions">
            <button class="action-btn" onclick="viewSkills()">Browse Skills</button>
            <button class="action-btn" onclick="mySessions()">My Sessions</button>
            <button class="action-btn" onclick="offerSkill()">Offer a Skill</button>
            <button class="action-btn" onclick="myProfile()">My Profile</button>
        </div>
    </div>

    <script>
        // Check if user is logged in
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) {
            window.location.href = 'login.html';
        }

        // Display user info
        document.getElementById('userEmail').textContent = user.email || 'User';
        document.getElementById('credits').textContent = user.credits || '0';
        document.getElementById('role').textContent = user.role || '-';

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        function viewSkills() {
            alert('Browse Skills feature coming soon!');
        }

        function mySessions() {
            alert('My Sessions feature coming soon!');
        }

        function offerSkill() {
            alert('Offer a Skill feature coming soon!');
        }

        function myProfile() {
            alert('My Profile feature coming soon!');
        }
    </script>
</body>
</html>
